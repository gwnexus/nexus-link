name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/nexus-link-service

jobs:
  # ---------------------------------------------------------------------------
  # Build cross-compiled binaries for each target platform.
  # Cargo registry + git cache is preserved between runs via Blacksmith cache.
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            artifact: nexus-link-aarch64-linux
            docker_platform: linux/arm64
          - target: x86_64-unknown-linux-gnu
            artifact: nexus-link-x86_64-linux
            docker_platform: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cargo dependency cache — keyed on Cargo.lock + target triple.
      # Saves ~60-90s on warm runs by skipping dependency recompilation.
      - name: Cache cargo registry
        uses: useblacksmith/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ matrix.target }}-

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nexus-link dist/
          cp target/${{ matrix.target }}/release/nexus-link-agent dist/
          cp target/${{ matrix.target }}/release/nexus-link-service dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      # Upload full tarball for GitHub Release
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      # Upload the service binary separately for the container build
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-link-service-${{ matrix.target }}
          path: dist/nexus-link-service

  # ---------------------------------------------------------------------------
  # Build a multi-arch container image from the pre-built binaries.
  # No compilation — just copies the verified cross-compiled artifact into
  # a minimal Debian slim image. Eliminates QEMU and cuts build time ~10x.
  #
  # Strategy:
  #   1. Build linux/arm64 image from aarch64 binary → push with arch suffix tag
  #   2. Build linux/amd64 image from x86_64 binary  → push with arch suffix tag
  #   3. Create and push a multi-arch manifest that covers both platforms
  # ---------------------------------------------------------------------------
  build-container:
    name: Container Image (${{ matrix.docker_platform }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-binaries]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            docker_platform: linux/arm64
            tag_suffix: arm64
          - target: x86_64-unknown-linux-gnu
            docker_platform: linux/amd64
            tag_suffix: amd64

    steps:
      - uses: actions/checkout@v4

      # Download the pre-built service binary for this platform
      - uses: actions/download-artifact@v4
        with:
          name: nexus-link-service-${{ matrix.target }}
          path: dist/

      - name: Mark binary executable
        run: chmod +x dist/nexus-link-service

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      # Build platform-specific image and push with arch-suffixed tag
      - name: Build and push (${{ matrix.docker_platform }})
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: ${{ matrix.docker_platform }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}-${{ matrix.tag_suffix }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # Assemble the multi-arch manifest from the two platform-specific images.
  # The manifest is what users pull when they run: docker pull <image>
  # Docker automatically selects the correct platform layer.
  # ---------------------------------------------------------------------------
  publish-manifest:
    name: Publish Multi-Arch Manifest
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-container]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MINOR=$(echo $VERSION | cut -d. -f1-2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "minor=${MINOR}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest
        run: |
          IMAGE=${{ steps.meta.outputs.image }}
          VERSION=${{ steps.meta.outputs.version }}
          MINOR=${{ steps.meta.outputs.minor }}

          # Manifest for exact version (e.g. 0.8.1)
          docker manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-arm64 \
            ${IMAGE}:${VERSION}-amd64

          # Manifest for minor version (e.g. 0.8)
          docker manifest create ${IMAGE}:${MINOR} \
            ${IMAGE}:${VERSION}-arm64 \
            ${IMAGE}:${VERSION}-amd64

          # Manifest for latest
          docker manifest create ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-arm64 \
            ${IMAGE}:${VERSION}-amd64

          docker manifest push ${IMAGE}:${VERSION}
          docker manifest push ${IMAGE}:${MINOR}
          docker manifest push ${IMAGE}:latest

  # ---------------------------------------------------------------------------
  # Create the GitHub Release with binary tarballs attached.
  # Waits for both binary builds and the multi-arch container manifest.
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-binaries, publish-manifest]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nexus-link-*-linux
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nexus-link-aarch64-linux.tar.gz
            nexus-link-x86_64-linux.tar.gz
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/nexus-link-service

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            artifact: nexus-link-aarch64-linux
          - target: x86_64-unknown-linux-gnu
            artifact: nexus-link-x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nexus-link dist/
          cp target/${{ matrix.target }}/release/nexus-link-agent dist/
          cp target/${{ matrix.target }}/release/nexus-link-service dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-container:
    name: Container Image (aarch64)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/Dockerfile.native
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [build-binaries]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nexus-link-aarch64-linux/nexus-link-aarch64-linux.tar.gz
            nexus-link-x86_64-linux/nexus-link-x86_64-linux.tar.gz
          generate_release_notes: true

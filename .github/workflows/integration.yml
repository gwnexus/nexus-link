name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --all

  # Integration tests that simulate the full CLI flow
  # These run only on Linux (the target deployment platform)
  integration:
    name: Integration (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      matrix:
        scenario:
          - cli-help
          - cli-preflight
          - cli-register-validation
          - service-health

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --all

      # -- Scenario: CLI help and version output --
      - name: "Test: CLI help and version"
        if: matrix.scenario == 'cli-help'
        run: |
          ./target/debug/nexus-link --version
          ./target/debug/nexus-link --help
          ./target/debug/nexus-link register --help
          ./target/debug/nexus-link preflight --help
          ./target/debug/nexus-link upgrade --help
          ./target/debug/nexus-link agent --help
          echo "All CLI help commands succeeded"

      # -- Scenario: Preflight check (no GPU in CI = expected failure) --
      - name: "Test: Preflight check (expects incompatible in CI)"
        if: matrix.scenario == 'cli-preflight'
        run: |
          set +e
          ./target/debug/nexus-link preflight
          EXIT_CODE=$?
          set -e
          # In CI (no GPU), preflight should exit 1 (incompatible)
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "PASS: Preflight correctly reports incompatible (no GPU in CI)"
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "PASS: Preflight passed (CI runner has GPU?)"
          else
            echo "FAIL: Unexpected exit code: $EXIT_CODE"
            exit 1
          fi

      # -- Scenario: Register validation (bad token format) --
      - name: "Test: Register token validation"
        if: matrix.scenario == 'cli-register-validation'
        run: |
          # Test 1: Invalid token format should fail immediately
          set +e
          OUTPUT=$(./target/debug/nexus-link register --token "invalid_token" --skip-preflight 2>&1)
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ne 0 ] && echo "$OUTPUT" | grep -q "Invalid token format"; then
            echo "PASS: Invalid token correctly rejected"
          else
            echo "FAIL: Expected token validation error"
            echo "Output: $OUTPUT"
            exit 1
          fi

          # Test 2: Valid format but unreachable API should fail with network error
          set +e
          OUTPUT=$(./target/debug/nexus-link register \
            --token "nxs_node_test123abc" \
            --api-url "https://nonexistent.invalid" \
            --skip-preflight 2>&1)
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "PASS: Unreachable API correctly fails registration"
          else
            echo "FAIL: Registration should not succeed against invalid API"
            exit 1
          fi

      # -- Scenario: Service health endpoint --
      - name: "Test: Service health endpoint"
        if: matrix.scenario == 'service-health'
        run: |
          # Create a minimal config for the service
          mkdir -p ~/.nexus-link
          cat > ~/.nexus-link/config.toml << 'EOF'
          [node]
          node_id = "test-node-ci"
          name = "ci-runner"
          token = "nxs_node_ci_test_token"
          tags = ["ci"]

          [api]
          base_url = "https://nexus.gatewarden.eu"
          push_interval_secs = 30

          [service]
          listen_addr = "127.0.0.1"
          port = 8443
          EOF

          # Start the service in background
          ./target/debug/nexus-link-service &
          SERVICE_PID=$!
          sleep 2

          # Test health endpoint
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" http://127.0.0.1:8443/api/health || echo "000")

          # Stop service
          kill $SERVICE_PID 2>/dev/null || true
          wait $SERVICE_PID 2>/dev/null || true

          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS: Health endpoint returned 200"
          else
            echo "FAIL: Health endpoint returned $HTTP_CODE (expected 200)"
            exit 1
          fi

  # Summary job for branch protection
  integration-result:
    name: Integration Result
    runs-on: ubuntu-latest
    needs: [unit-tests, integration]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          echo "All tests passed"

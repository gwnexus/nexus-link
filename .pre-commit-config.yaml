#
# .pre-commit-config.yaml — nexus-link
#
# Pre-commit hook configuration for nexus-link (Rust workspace).
#
# All Rust-specific hooks are defined as 'local' hooks that invoke cargo
# directly, using the exact toolchain pinned in rust-toolchain.toml.
#
# RUSTFLAGS is explicitly cleared in every Rust hook to prevent the
# devbox RUSTFLAGS="-C link-arg=-fuse-ld=mold" from failing on macOS
# where the mold linker is not available.
#
# The devbox init_hook installs the hooks automatically on 'devbox shell':
#   pre-commit install --install-hooks
#
# To install or re-install manually inside the devbox shell:
#   pre-commit install
#   pre-commit install --install-hooks
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Skip hooks for a WIP commit (use sparingly, never on main):
#   git commit --no-verify -m "wip: ..."

default_install_hook_types:
  - pre-commit

default_stages:
  - pre-commit

fail_fast: false

repos:
  # ---------------------------------------------------------------------------
  # Generic file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of file
      - id: check-yaml
        name: check yaml syntax
      - id: check-toml
        name: check toml syntax
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: mixed-line-ending
        args: [--fix=lf]
        name: enforce LF line endings

  # ---------------------------------------------------------------------------
  # Rust — local hooks (toolchain from rust-toolchain.toml)
  #
  # RUSTFLAGS="" is set explicitly in every Rust hook to prevent the devbox
  # RUSTFLAGS="-C link-arg=-fuse-ld=mold" from failing on macOS where
  # the mold linker is not available.
  #
  # Hook execution order:
  #   1. rust-fmt       — auto-format (cargo fmt --all)
  #   2. rust-fix       — auto-apply machine-applicable cargo suggestions
  #   3. rust-check     — type + borrow check (no binary produced)
  #   4. rust-clippy    — lint with -D warnings (consistent with CI)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # --- Format (auto-fix) --------------------------------------------------
      # Runs cargo fmt --all. If any file is reformatted the hook exits
      # non-zero so the commit is aborted. Stage the formatted files and
      # commit again — the second run will pass.
      - id: rust-fmt
        name: cargo fmt
        language: system
        entry: env RUSTFLAGS="" cargo fmt --all
        types: [rust]
        pass_filenames: false

      # --- Auto-fix (machine-applicable suggestions) --------------------------
      # Applies simple, safe compiler suggestions (unused imports, trivial
      # reformulations) that cargo can patch automatically. Uses
      # --allow-staged so it operates on the staged snapshot, not the
      # working tree, keeping the commit atomic.
      - id: rust-fix
        name: cargo fix
        language: system
        entry: env RUSTFLAGS="" cargo fix --allow-staged --allow-dirty
        types: [rust]
        pass_filenames: false

      # --- Type check ---------------------------------------------------------
      # Resolves types and borrow-checks without producing a binary.
      # Faster than a full build; catches compile errors before clippy runs.
      - id: rust-check
        name: cargo check
        language: system
        entry: env RUSTFLAGS="" cargo check --all
        types: [rust]
        pass_filenames: false

      # --- Lint ---------------------------------------------------------------
      # -D warnings promotes every clippy warning to an error, consistent
      # with CI. Runs last — only reached if fmt + fix + check all pass.
      - id: rust-clippy
        name: cargo clippy
        language: system
        entry: env RUSTFLAGS="" cargo clippy --all -- -D warnings
        types: [rust]
        pass_filenames: false
